version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: memoreel-postgres
    environment:
      POSTGRES_DB: memoreel
      POSTGRES_USER: memoreel_user
      POSTGRES_PASSWORD: memoreel_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - memoreel-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memoreel_user -d memoreel"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: memoreel-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - memoreel-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  memoreel-network:
    driver: bridge

