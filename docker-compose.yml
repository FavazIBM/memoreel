version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: memoreel-postgres
    environment:
      POSTGRES_DB: memoreel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
      TZ: UTC
      PGTZ: UTC
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-postgres.sh:/docker-entrypoint-initdb.d/init-postgres.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - memoreel-network

  redis:
    image: redis:7-alpine
    container_name: memoreel-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - memoreel-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  memoreel-network:
    driver: bridge

