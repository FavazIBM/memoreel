# Development Profile Configuration

# Server Configuration
server.port=8080

# Database Configuration - Development
spring.datasource.url=jdbc:postgresql://localhost:5432/memoreel
spring.datasource.username=memoreel_user
spring.datasource.password=memoreel_password

# JPA Configuration - Development
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=true

# Logging Configuration - Development
logging.level.root=INFO
logging.level.com.memoreel=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Actuator Configuration - Development
management.endpoints.web.exposure.include=health,info,metrics,env,beans,mappings
management.endpoint.health.show-details=always

# CORS Configuration - Development (Allow all for local development)
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173

# File Upload - Development (Smaller limits for testing)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=250MB

# Redis Configuration - Development
spring.data.redis.host=localhost
spring.data.redis.port=6379

# AWS S3 - Development (Use local or test bucket)
app.aws.s3.bucket-name=memoreel-media-dev

# FFmpeg - Development
app.ffmpeg.path=/usr/local/bin/ffmpeg
app.ffmpeg.ffprobe-path=/usr/local/bin/ffprobe

# Video Processing - Development (Faster processing for testing)
app.video.max-duration=180
app.video.default-resolution=1280x720

# Session - Development (Shorter timeout for testing)
spring.session.timeout=3600

# Security - Development (Less strict for testing)
app.jwt.expiration=86400000

# Enable H2 Console (Optional - for quick testing)
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console

# DevTools Configuration
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

