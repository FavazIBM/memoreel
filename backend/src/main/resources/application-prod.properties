# Production Profile Configuration

# Server Configuration
server.port=${SERVER_PORT:8080}
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false

# Database Configuration - Production
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA Configuration - Production
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Logging Configuration - Production
logging.level.root=WARN
logging.level.com.memoreel=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
logging.file.name=/var/log/memoreel/application.log
logging.file.max-size=10MB
logging.file.max-history=30
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Actuator Configuration - Production (Restricted)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.metrics.export.prometheus.enabled=true

# CORS Configuration - Production (Strict)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
app.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH
app.cors.allowed-headers=Authorization,Content-Type,Accept
app.cors.allow-credentials=true

# File Upload - Production
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=500MB

# Redis Configuration - Production
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.ssl=true
spring.data.redis.timeout=60000

# Session - Production
spring.session.timeout=1800
spring.session.redis.flush-mode=on-save
spring.session.redis.namespace=memoreel:session

# AWS S3 - Production
app.aws.access-key-id=${AWS_ACCESS_KEY_ID}
app.aws.secret-access-key=${AWS_SECRET_ACCESS_KEY}
app.aws.region=${AWS_REGION}
app.aws.s3.bucket-name=${AWS_S3_BUCKET_NAME}
app.aws.s3.bucket-url=${AWS_S3_BUCKET_URL}

# FFmpeg - Production
app.ffmpeg.path=${FFMPEG_PATH:/usr/bin/ffmpeg}
app.ffmpeg.ffprobe-path=${FFPROBE_PATH:/usr/bin/ffprobe}

# Video Processing - Production
app.video.max-duration=300
app.video.default-resolution=1920x1080
app.video.default-fps=30
app.video.default-bitrate=5000k

# Security - Production
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# Batch Processing - Production
spring.batch.job.enabled=true
app.batch.chunk-size=10
app.batch.thread-pool-size=10

# Quartz - Production
spring.quartz.properties.org.quartz.threadPool.threadCount=10
spring.quartz.properties.org.quartz.jobStore.isClustered=true
spring.quartz.properties.org.quartz.jobStore.clusterCheckinInterval=20000

# Cache Configuration - Production
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000
spring.cache.redis.cache-null-values=false

# Compression - Production
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,application/javascript,text/css

# SSL/TLS - Production (if using HTTPS)
# server.ssl.enabled=true
# server.ssl.key-store=${SSL_KEY_STORE}
# server.ssl.key-store-password=${SSL_KEY_STORE_PASSWORD}
# server.ssl.key-store-type=PKCS12

# DevTools - Disabled in Production
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

