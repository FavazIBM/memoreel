# Application Name
spring.application.name=memoreel-backend

# Active Profile
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Server Configuration
server.port=${SERVER_PORT:8080}
server.address=${SERVER_ADDRESS:0.0.0.0}
server.error.include-message=always
server.error.include-binding-errors=always

# Database Configuration
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/memoreel}
spring.datasource.username=${DATABASE_USERNAME:memoreel_user}
spring.datasource.password=${DATABASE_PASSWORD:memoreel_password}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.postgresql.Driver}

# JPA/Hibernate Configuration
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.hibernate.ddl-auto=${JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.database-platform=${JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true

# Redis Configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.database=${REDIS_DATABASE:0}
spring.data.redis.timeout=60000

# Session Configuration
spring.session.store-type=redis
spring.session.timeout=${SESSION_TIMEOUT:1800}

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=${FILE_UPLOAD_MAX_SIZE:100MB}
spring.servlet.multipart.max-request-size=${FILE_UPLOAD_MAX_REQUEST_SIZE:500MB}
spring.servlet.multipart.file-size-threshold=2KB

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=non_null

# Logging Configuration
logging.level.root=${LOGGING_LEVEL_ROOT:INFO}
logging.level.com.memoreel=${LOGGING_LEVEL_COM_MEMOREEL:DEBUG}
logging.level.org.springframework=${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK:INFO}
logging.level.org.hibernate=${LOGGING_LEVEL_ORG_HIBERNATE:INFO}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Actuator Configuration
management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info,metrics}
management.endpoint.health.show-details=${MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS:when-authorized}
management.metrics.export.prometheus.enabled=true

# Batch Configuration
spring.batch.job.enabled=false
spring.batch.jdbc.initialize-schema=always

# Quartz Configuration
spring.quartz.job-store-type=jdbc
spring.quartz.jdbc.initialize-schema=always
spring.quartz.properties.org.quartz.threadPool.threadCount=${BATCH_THREAD_POOL_SIZE:5}

# OAuth2 Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8080/api/v1/auth/oauth2/callback/google}

# Application Custom Properties
app.name=${APP_NAME:Memoreel}
app.version=${APP_VERSION:1.0.0}
app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}
app.backend-url=${APP_BACKEND_URL:http://localhost:8080}

# JWT Configuration
app.jwt.secret=${JWT_SECRET:your-secret-key-change-this-in-production-min-256-bits}
app.jwt.expiration=${JWT_EXPIRATION:86400000}
app.jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# AWS S3 Configuration
app.aws.access-key-id=${AWS_ACCESS_KEY_ID:}
app.aws.secret-access-key=${AWS_SECRET_ACCESS_KEY:}
app.aws.region=${AWS_REGION:us-east-1}
app.aws.s3.bucket-name=${AWS_S3_BUCKET_NAME:memoreel-media}
app.aws.s3.bucket-url=${AWS_S3_BUCKET_URL:https://memoreel-media.s3.amazonaws.com}

# FFmpeg Configuration
app.ffmpeg.path=${FFMPEG_PATH:/usr/local/bin/ffmpeg}
app.ffmpeg.ffprobe-path=${FFPROBE_PATH:/usr/local/bin/ffprobe}

# Video Processing Configuration
app.video.max-duration=${VIDEO_MAX_DURATION:300}
app.video.default-resolution=${VIDEO_DEFAULT_RESOLUTION:1920x1080}
app.video.default-fps=${VIDEO_DEFAULT_FPS:30}
app.video.default-bitrate=${VIDEO_DEFAULT_BITRATE:5000k}

# File Upload Validation
app.upload.allowed-image-types=${FILE_UPLOAD_ALLOWED_IMAGE_TYPES:image/jpeg,image/png,image/jpg}
app.upload.allowed-video-types=${FILE_UPLOAD_ALLOWED_VIDEO_TYPES:video/mp4,video/quicktime,video/x-msvideo}

# QR Code Configuration
app.qr.size=${QR_CODE_SIZE:300}
app.qr.error-correction=${QR_CODE_ERROR_CORRECTION:H}
app.qr.margin=${QR_CODE_MARGIN:1}

# CORS Configuration
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
app.cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,PATCH,OPTIONS}
app.cors.allowed-headers=${CORS_ALLOWED_HEADERS:*}
app.cors.allow-credentials=${CORS_ALLOW_CREDENTIALS:true}

