# Memoreel Backend Docker Configuration
spring.application.name=memoreel-backend

# ============================================
# SERVER CONFIGURATION
# ============================================
server.port=8080
server.servlet.context-path=/api/v1

# ============================================
# DATABASE CONFIGURATION
# ============================================
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://postgres:5432/memoreel}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ============================================
# FLYWAY CONFIGURATION
# ============================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true

# ============================================
# REDIS CONFIGURATION
# ============================================
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.database=0
spring.data.redis.timeout=60000

# Redis Session
spring.session.store-type=redis
spring.session.timeout=3600000

# ============================================
# JWT CONFIGURATION
# ============================================
jwt.secret=${JWT_SECRET:your_super_secret_jwt_key_change_this_in_production}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# ============================================
# AWS S3 CONFIGURATION
# ============================================
aws.access-key-id=${AWS_ACCESS_KEY_ID:}
aws.secret-access-key=${AWS_SECRET_ACCESS_KEY:}
aws.region=${AWS_REGION:us-east-1}
aws.s3.bucket-name=${AWS_S3_BUCKET_NAME:memoreel-media}
aws.s3.bucket-url=${AWS_S3_BUCKET_URL:https://memoreel-media.s3.amazonaws.com}

# ============================================
# GOOGLE OAUTH CONFIGURATION
# ============================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/api/v1/auth/google/callback

# ============================================
# FILE UPLOAD CONFIGURATION
# ============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=500MB
spring.servlet.multipart.file-size-threshold=2MB

# Custom file upload limits
file.upload.max-image-size=5242880
file.upload.max-video-size=52428800
file.upload.max-project-media-size=524288000
file.upload.max-media-per-project=50

# ============================================
# FFMPEG CONFIGURATION
# ============================================
ffmpeg.path=${FFMPEG_PATH:/usr/bin/ffmpeg}
ffprobe.path=${FFPROBE_PATH:/usr/bin/ffprobe}

# Video processing configuration
video.processing.timeout=300000
video.output.resolution=1080p
video.output.format=mp4
video.max-concurrent-jobs=5

# ============================================
# QR CODE CONFIGURATION
# ============================================
qr.code.size=512
qr.code.format=PNG
qr.code.error-correction=H

# ============================================
# SPRING BATCH CONFIGURATION
# ============================================
spring.batch.job.enabled=false
spring.batch.jdbc.initialize-schema=always

# ============================================
# QUARTZ SCHEDULER CONFIGURATION
# ============================================
spring.quartz.job-store-type=jdbc
spring.quartz.jdbc.initialize-schema=always
spring.quartz.properties.org.quartz.threadPool.threadCount=10

# ============================================
# LOGGING CONFIGURATION
# ============================================
logging.level.root=INFO
logging.level.com.memoreel=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ============================================
# CORS CONFIGURATION
# ============================================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://frontend:80}
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

# ============================================
# RATE LIMITING CONFIGURATION
# ============================================
rate.limit.requests=100
rate.limit.window=60000

# ============================================
# ACTUATOR CONFIGURATION
# ============================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.metrics.export.prometheus.enabled=true

# ============================================
# APPLICATION METADATA
# ============================================
app.name=Memoreel
app.version=1.0.0
app.url=http://localhost:3000

